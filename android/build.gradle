import java.util.regex.Pattern

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.1'
        classpath 'com.github.triplet.gradle:play-publisher:4.0.0'
    }
}

ext {
    findAAR = { dirPath, baseName ->
        def dir = file(dirPath)
        if (!dir.exists()) return null
        def re = ~/^${Pattern.quote(baseName)}(?:-\d+\.\d+\.\d+)?\.aar$/
        return dir.listFiles()?.find { f -> f.isFile() && f.name ==~ re }
    }
    usingAAR = 0
    if (findAAR('augustus/libs', 'SDL3') && findAAR('augustus/libs', 'SDL3_mixer')) {
        usingAAR = 3
    } else if (file('augustus/libs/SDL2.aar').exists() || file('augustus/libs/SDL2-debug.aar').exists() || file('augustus/libs/SDL2-release.aar').exists()) {
        usingAAR = 2
    }
}

tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}
